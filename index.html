<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Critical External Connections -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">

  <link rel="icon" type="image/png" href="assets/favicon.png">
  <title>ScoreMyInterview</title>

  <!-- Security headers are now correctly served via netlify.toml true HTTP headers -->
  <!-- Disable console in production -->
  <script>
    (function () {
      if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        var noop = function () { };
        ['log', 'debug', 'info', 'warn', 'error', 'trace', 'dir', 'group', 'groupEnd', 'time', 'timeEnd', 'table'].forEach(function (method) {
          console[method] = noop;
        });
      }
    })();
  </script>

  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style"
    onload="this.onload=null;this.rel='stylesheet'"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
  </noscript>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body class="bg-white text-black">
  <app-root>
    <!-- App shell: shows instantly while Angular bootstraps, auto-replaced once ready -->
    <div id="app-shell" style="
      position:fixed; inset:0; z-index:99999;
      background:#fff;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:16px;
    ">
      <!-- Logo -->
      <img src="assets/favicon.png" alt="ScoreMyInterview" style="width:40px; height:40px; object-fit:contain;"
        onerror="this.style.display='none'">
      <!-- Brand name -->
      <span
        style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.1rem; color:#111; letter-spacing:-0.03em;">
        ScoreMyInterview
      </span>
      <!-- Animated dots -->
      <div style="display:flex; gap:6px; margin-top:4px;">
        <span
          style="width:7px;height:7px;border-radius:50%;background:#111;animation:smi-dot 1.2s ease-in-out infinite 0s;"></span>
        <span
          style="width:7px;height:7px;border-radius:50%;background:#111;animation:smi-dot 1.2s ease-in-out infinite 0.2s;"></span>
        <span
          style="width:7px;height:7px;border-radius:50%;background:#111;animation:smi-dot 1.2s ease-in-out infinite 0.4s;"></span>
      </div>
      <style>
        @keyframes smi-dot {

          0%,
          80%,
          100% {
            transform: scale(0.6);
            opacity: 0.3
          }

          40% {
            transform: scale(1);
            opacity: 1
          }
        }
      </style>
    </div>
  </app-root>
</body>

</html>
